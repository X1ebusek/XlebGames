<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xleb Games</title>
    <style>
        :root {
            --bg: #07071c;
            --accent: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.5);
            --active-text: #ffffff;
            --glass-bg: rgba(15, 15, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --text-secondary: #b0b8ff;
            --radius: 1.8rem;
            --transition: 0.25s ease-out;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 20% 20%, rgba(129,140,248,0.25) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(244,114,182,0.2) 0%, transparent 50%),
                        radial-gradient(circle at 40% 60%, rgba(56,189,248,0.15) 0%, transparent 50%);
            background-size: 100% 100%;
            animation: auroraShift 20s ease-in-out infinite;
        }
        @keyframes auroraShift {
            0%, 100% { background-position: 0% 0%, 100% 100%, 50% 50%; }
            50% { background-position: 100% 20%, 0% 80%, 70% 30%; }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
        }
        .container:not(.hidden) {
            animation: screenIn 0.3s ease-out forwards;
        }
        @keyframes screenIn {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .hidden { display: none !important; }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 1.8rem 1.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            width: 100%;
        }

        #roleCard.card {
            background: rgba(20, 20, 45, 0.85);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .dashed-card {
            background: rgba(255,255,255,0.03);
            border: 2px dashed rgba(255,255,255,0.25);
            border-radius: 1.2rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
            animation: dashPulse 2.5s ease-in-out infinite;
        }
        @keyframes dashPulse {
            0%, 100% { border-color: rgba(255,255,255,0.12); }
            50% { border-color: rgba(255,255,255,0.45); }
        }

        h1 {
            font-weight: 900;
            font-size: 2.6rem;
            letter-spacing: 0.03em;
            margin: 0;
            background: linear-gradient(135deg, #e0e7ff, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px var(--accent-glow));
            background-size: 200% 200%;
            animation: titleShine 5s ease infinite;
        }
        @keyframes titleShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        h2 {
            font-size: 2rem;
            margin: 0.3rem 0;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        button {
            cursor: pointer;
            border: none;
            font-family: inherit;
            outline: none;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        button.main-btn {
            background: linear-gradient(135deg, #818cf8, #6366f1);
            color: #fff;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 1.2rem;
            width: 100%;
            min-height: 54px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            box-shadow: 0 6px 22px var(--accent-glow);
            will-change: transform;
        }
        button.main-btn:active:not(:disabled) {
            transform: scale(0.96);
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        button.main-btn:disabled {
            background: rgba(40,40,60,0.6) !important;
            color: rgba(255,255,255,0.3) !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }
        button.main-btn.secondary-btn {
            background: rgba(255,255,255,0.08);
            color: var(--text);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .btn-brawl { background: linear-gradient(135deg, #38bdf8, #0ea5e9) !important; box-shadow: 0 6px 20px rgba(56,189,248,0.55) !important; }
        .btn-mc { background: linear-gradient(135deg, #4ade80, #22c55e) !important; box-shadow: 0 6px 20px rgba(74,222,128,0.55) !important; }
        .btn-cr { background: linear-gradient(135deg, #fbbf24, #f59e0b) !important; box-shadow: 0 6px 20px rgba(251,191,36,0.55) !important; }
        .btn-genshin { background: linear-gradient(135deg, #f8fafc, #e2e8f0) !important; color: #0f172a !important; box-shadow: 0 6px 20px rgba(248,250,252,0.55) !important; }
        .btn-locations { background: linear-gradient(135deg, #14b8a6, #0d9488) !important; box-shadow: 0 6px 20px rgba(20,184,166,0.55) !important; }
        .btn-random { background: linear-gradient(135deg, #f472b6, #c084fc, #818cf8, #f472b6) !important; background-size: 300% 100% !important; animation: rainbowBtn 3s linear infinite !important; box-shadow: 0 6px 20px rgba(192,132,252,0.55) !important; }
        @keyframes rainbowBtn { 0%{background-position:0% 50%;} 100%{background-position:100% 50%;} }

        .mode-selector { display: flex; gap: 0.6rem; margin-top: 0.8rem; width: 100%; }
        .mode-btn {
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            padding: 0.75rem;
            border-radius: 0.9rem;
            flex: 1;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.25s ease-out;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mode-btn.active {
            background: var(--accent);
            color: var(--active-text);
            transform: scale(1.03);
            box-shadow: 0 6px 16px var(--accent-glow);
            border-color: transparent;
        }

        .cat-toggles { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.7rem; justify-content: center; }
        .cat-toggle {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            padding: 0.4rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease-out;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .cat-toggle.active {
            background: var(--accent);
            color: var(--active-text);
            box-shadow: 0 4px 12px var(--accent-glow);
            transform: translateY(-2px);
        }

        .role-img-container {
            width: 170px; height: 170px; margin: 1rem auto;
            background: rgba(0,0,0,0.3);
            border-radius: 1.8rem; overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        .role-img {
            width: 90%; height: 90%; object-fit: contain;
            animation: breathe 3.2s ease-in-out infinite;
            filter: drop-shadow(0 8px 14px var(--accent-glow));
        }
        @keyframes breathe { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }

        #roleCard:not(.hidden) {
            animation: cardPop 0.35s ease-out forwards;
        }
        @keyframes cardPop {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        #notification {
            position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: var(--accent); padding: 1rem 2rem; border-radius: 3rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
            transition: top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000; font-weight: 700; letter-spacing: 0.02em;
        }
        #notification.show { top: 30px; }

        .admin-row { display: flex; flex-direction: column; text-align: left; margin-bottom: 0.9rem; gap: 0.15rem; }
        .admin-row label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
        .admin-row input, .admin-row select {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 0.6rem 0.8rem; border-radius: 0.8rem; font-size: 0.9rem; outline: none;
        }
        .version-tag { position: fixed; bottom: 12px; font-size: 0.65rem; color: rgba(255,255,255,0.15); z-index: 999; cursor: default; }
    </style>
</head>
<body>

    <div class="aurora"></div>

    <div id="notification">Все роли розданы!</div>

    <div class="container" id="main-menu">
        <h1>Xleb Games</h1>
        <button class="main-btn btn-brawl" onclick="showCategories()">ИГРАТЬ В ШПИОНА</button>
        <p style="font-size:0.8rem;color:var(--text-secondary);margin-top:1.4rem;opacity:0.7;">
            Подпишись на <a href="https://t.me/xlebusek_v_gd" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:700;">телеграмм канал</a>
        </p>
    </div>

    <div class="container hidden" id="category-menu">
        <h1>Категории</h1>
        <div class="card" style="display:flex;flex-direction:column;gap:0.8rem;padding:1.5rem;">
            <button class="main-btn btn-brawl" onclick="showSetup('brawl')">BRAWL STARS</button>
            <button class="main-btn btn-mc" onclick="showSetup('minecraft')">MINECRAFT</button>
            <button class="main-btn btn-cr" onclick="showSetup('clash')">CLASH ROYALE</button>
            <button class="main-btn btn-genshin" onclick="showSetup('genshin')">GENSHIN IMPACT</button>
            <button class="main-btn btn-locations" onclick="showSetup('locations')">ЛОКАЦИИ</button>
            <button class="main-btn btn-random" onclick="showSetup('random')">🎲 РАНДОМ</button>
        </div>
        <button class="main-btn secondary-btn" onclick="goBackToMain()">НАЗАД</button>
    </div>

    <div class="container hidden" id="setup">
        <h1 id="setupTitle">Настройка</h1>
        <div class="card">
            <p style="color:var(--text-secondary);font-size:0.85rem;margin:0 0 0.5rem;">Количество игроков?</p>
            <input type="number" id="playerCount" value="3" min="2" max="100" style="width:80px;text-align:center;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:0.5rem;border-radius:0.8rem;font-size:1rem;outline:none;">

            <p style="color:var(--text-secondary);font-size:0.85rem;margin:1.5rem 0 0.3rem;">Шпионы:</p>
            <div class="mode-selector">
                <button id="btn1" class="mode-btn active" onclick="setMode('one')">1 Шпион</button>
                <button id="btnRnd" class="mode-btn" onclick="setMode('random')">Рандом</button>
            </div>

            <div id="randomSettings" class="hidden" style="margin-top:1.5rem;">
                <p style="color:var(--text-secondary);font-size:0.8rem;margin-bottom:0.4rem;">Участвуют в рандоме:</p>
                <div class="cat-toggles" id="randCats">
                    <div class="cat-toggle active" data-val="brawl" onclick="toggleRandomCat(this)">Brawl Stars</div>
                    <div class="cat-toggle active" data-val="minecraft" onclick="toggleRandomCat(this)">Minecraft</div>
                    <div class="cat-toggle active" data-val="clash" onclick="toggleRandomCat(this)">Clash Royale</div>
                    <div class="cat-toggle active" data-val="genshin" onclick="toggleRandomCat(this)">Genshin Impact</div>
                    <div class="cat-toggle active" data-val="locations" onclick="toggleRandomCat(this)">Локации</div>
                </div>
            </div>
        </div>
        <button id="startGameBtn" class="main-btn" onclick="startGame()">НАЧАТЬ</button>
        <button class="main-btn secondary-btn" onclick="goBackToCategories()">НАЗАД</button>
    </div>

    <div class="container hidden" id="admin-menu">
        <h1 style="background:linear-gradient(135deg,#ef4444,#f87171);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 20px rgba(239,68,68,0.5));">Admin Panel</h1>
        <div class="card" style="padding:1.5rem;">
            <div class="admin-row">
                <label>Категория</label>
                <select id="adminCat" onchange="updateAdminCharList()">
                    <option value="brawl">Brawl Stars</option>
                    <option value="minecraft">Minecraft</option>
                    <option value="clash">Clash Royale</option>
                    <option value="genshin">Genshin Impact</option>
                    <option value="locations">Локации</option>
                </select>
            </div>
            <div class="admin-row">
                <label>Персонаж для мирных</label>
                <select id="adminChar"></select>
            </div>
            <div class="admin-row">
                <label>Всего игроков</label>
                <input type="number" id="adminPlayerCount" value="4" min="2">
            </div>
            <div class="admin-row">
                <label>Номера шпионов (через запятую)</label>
                <input type="text" id="adminSpies" placeholder="Например: 2, 4">
            </div>
            <div class="admin-row" style="margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.08);">
                <label style="color:#ef4444;font-weight:700;">Роли прошлой игры:</label>
                <div id="adminLastGameRoles">Игр еще не было</div>
            </div>
        </div>
        <button class="main-btn" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;" onclick="startAdminGame()">ИГРАТЬ</button>
        <button class="main-btn secondary-btn" onclick="closeAdminMenu()">ЗАКРЫТЬ</button>
    </div>

    <div class="container hidden" id="game">
        <div id="roleCard" class="card hidden">
            <p style="color:var(--text-secondary);font-size:0.85rem;margin:0;">Твоя роль:</p>
            <h2 id="roleText"></h2>
            <div class="role-img-container"><img id="roleImg" class="role-img" src="" alt=""></div>
            <button class="main-btn secondary-btn" onclick="nextPlayer()">СКРЫТЬ</button>
        </div>

        <div id="tapArea">
            <div class="dashed-card"><p id="playerInstruction" style="margin:0;font-size:1.1rem;font-weight:700;"></p></div>
            <button class="main-btn" onclick="showRole()">ПОКАЗАТЬ РОЛЬ</button>
        </div>
        <p id="playerStatus" style="color:var(--text-secondary);margin-top:1.2rem;font-weight:700;letter-spacing:0.03em;font-size:0.9rem;"></p>
    </div>

    <div class="version-tag" id="versionTag" onclick="handleVersionTap()">Версия 5.0</div>

    <script>

        // Остальная логика приложения (без изменений)
        let roles = [];
        let lastGameRoles = [];
        let currentIndex = 0;
        let spyMode = 'one';
        let currentCategory = 'brawl';
        let actualCategory = 'brawl';
        const spyIcon = "https://cdn.brawlify.com/profile/28000000.png";
        let apiBrawlersData = [];

        fetch('https://api.brawlapi.com/v1/brawlers')
            .then(res => res.json())
            .then(json => { apiBrawlersData = json.list || []; })
            .catch(err => console.error("Ошибка API:", err));

        let versionTaps = 0;
        let tapTimeout;

        function handleVersionTap() {
            versionTaps++;
            clearTimeout(tapTimeout);
            if(versionTaps >= 5) {
                versionTaps = 0;
                document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
                resetTheme();
                updateAdminCharList();
                showLastGameRoles();
                document.getElementById('admin-menu').classList.remove('hidden');
            } else {
                tapTimeout = setTimeout(() => { versionTaps = 0; }, 600);
            }
        }

        function showLastGameRoles() {
            let historyDiv = document.getElementById('adminLastGameRoles');
            if (lastGameRoles && lastGameRoles.length > 0) {
                let html = lastGameRoles.map((roleName, index) => {
                    let color = roleName === "ШПИОН" ? "#ef4444" : "var(--text)";
                    return `<span style="color:${color}">Игрок ${index + 1} - ${roleName}</span>`;
                }).join('<br>');
                historyDiv.innerHTML = html;
            } else {
                historyDiv.innerHTML = "Игр еще не было";
            }
        }

        function updateAdminCharList() {
            const cat = document.getElementById('adminCat').value;
            const sel = document.getElementById('adminChar');
            sel.innerHTML = '';
            data[cat].sort((a,b) => a.n.localeCompare(b.n)).forEach((char) => {
                let opt = document.createElement('option');
                opt.value = char.id;
                opt.innerText = char.n;
                sel.appendChild(opt);
            });
        }

        function closeAdminMenu() {
            document.getElementById('admin-menu').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function startAdminGame() {
            let count = parseInt(document.getElementById('adminPlayerCount').value) || 2;
            let cat = document.getElementById('adminCat').value;
            let charId = document.getElementById('adminChar').value;
            let spyStr = document.getElementById('adminSpies').value;

            let spiesIndices = [];
            if (spyStr.trim() !== '') {
                spiesIndices = spyStr.split(',').map(s => parseInt(s.trim()) - 1).filter(n => !isNaN(n) && n >= 0 && n < count);
            }

            let pick = data[cat].find(c => c.id === charId);
            actualCategory = cat;

            roles = [];
            for (let i = 0; i < count; i++) {
                if (spiesIndices.includes(i)) {
                    roles.push({ n: "ШПИОН", id: "spy", img: spyIcon, cat: cat });
                } else {
                    let initialImg = ""; let brawlerNumId = null;
                    if (cat === 'brawl') {
                        let apiMatch = apiBrawlersData.find(b => b.name.toLowerCase().replace(/[^a-z0-9]/g, '') === pick.id.replace(/[^a-z0-9]/g, ''));
                        if (apiMatch) { brawlerNumId = apiMatch.id; initialImg = `https://cdn.brawlify.com/brawlers/model/${brawlerNumId}.png`; }
                    } else if (cat === 'clash') initialImg = `https://cdn.royaleapi.com/static/img/cards/hd/${pick.id}.png`;
                    else if (cat === 'genshin') initialImg = `https://genshin.jmp.blue/characters/${pick.id}/portrait`;
                    else if (cat === 'locations') initialImg = pick.img;
                    else initialImg = `https://minecraft.wiki/wiki/Special:FilePath/${pick.id}_JE2_BE2.png`;

                    roles.push({ n: pick.n.toUpperCase(), id: pick.id, img: initialImg, numId: brawlerNumId, cat: cat });
                }
            }

            lastGameRoles = roles.map(r => r.n);
            currentIndex = 0;
            document.getElementById('admin-menu').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            updateUI();
        }

        function resetTheme() {
            document.body.classList.remove('theme-random');
            document.documentElement.style.setProperty('--accent', '#818cf8');
            document.documentElement.style.setProperty('--accent-glow', 'rgba(129,140,248,0.5)');
            document.documentElement.style.setProperty('--active-text', '#ffffff');
        }

        function showCategories() { resetTheme(); document.getElementById('main-menu').classList.add('hidden'); document.getElementById('category-menu').classList.remove('hidden'); }
        function goBackToMain() { resetTheme(); document.getElementById('category-menu').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); }

        function checkStartButton() {
            let btn = document.getElementById('startGameBtn');
            if (currentCategory === 'random') {
                let activeCount = document.querySelectorAll('#randCats .cat-toggle.active').length;
                if (activeCount < 2) {
                    btn.disabled = true;
                    btn.innerText = "ВЫБЕРИТЕ МИНИМУМ 2";
                    btn.style.fontSize = "0.8rem";
                } else {
                    btn.disabled = false;
                    btn.innerText = "НАЧАТЬ";
                    btn.style.fontSize = "1rem";
                }
            } else {
                btn.disabled = false;
                btn.innerText = "НАЧАТЬ";
                btn.style.fontSize = "1rem";
            }
        }

        function toggleRandomCat(element) {
            element.classList.toggle('active');
            checkStartButton();
        }

        function showSetup(cat) {
            currentCategory = cat;
            document.body.classList.remove('theme-random');
            document.getElementById('randomSettings').classList.add('hidden');
            const root = document.documentElement;

            if (cat === 'genshin') {
                root.style.setProperty('--accent', '#f8fafc');
                root.style.setProperty('--accent-glow', 'rgba(248,250,252,0.5)');
                root.style.setProperty('--active-text', '#0f172a');
                document.getElementById('setupTitle').innerText = 'Genshin Impact';
            } else if (cat === 'minecraft') {
                root.style.setProperty('--accent', '#4ade80');
                root.style.setProperty('--accent-glow', 'rgba(74,222,128,0.5)');
                root.style.setProperty('--active-text', '#ffffff');
                document.getElementById('setupTitle').innerText = 'Minecraft';
            } else if (cat === 'clash') {
                root.style.setProperty('--accent', '#fbbf24');
                root.style.setProperty('--accent-glow', 'rgba(251,191,36,0.5)');
                root.style.setProperty('--active-text', '#0f172a');
                document.getElementById('setupTitle').innerText = 'Clash Royale';
            } else if (cat === 'locations') {
                root.style.setProperty('--accent', '#14b8a6');
                root.style.setProperty('--accent-glow', 'rgba(20,184,166,0.5)');
                root.style.setProperty('--active-text', '#ffffff');
                document.getElementById('setupTitle').innerText = 'Локации';
            } else if (cat === 'random') {
                document.body.classList.add('theme-random');
                document.getElementById('setupTitle').innerText = 'Рандом';
                document.getElementById('randomSettings').classList.remove('hidden');
                root.style.setProperty('--active-text', '#ffffff');
            } else {
                root.style.setProperty('--accent', '#818cf8');
                root.style.setProperty('--accent-glow', 'rgba(129,140,248,0.5)');
                root.style.setProperty('--active-text', '#ffffff');
                document.getElementById('setupTitle').innerText = 'Brawl Stars';
            }

            checkStartButton();
            document.getElementById('category-menu').classList.add('hidden');
            document.getElementById('setup').classList.remove('hidden');
        }

        function goBackToCategories() { resetTheme(); document.getElementById('setup').classList.add('hidden'); document.getElementById('category-menu').classList.remove('hidden'); }
        function setMode(m) { spyMode = m; document.getElementById('btn1').classList.toggle('active', m === 'one'); document.getElementById('btnRnd').classList.toggle('active', m === 'random'); }

        function startGame() {
            let count = parseInt(document.getElementById('playerCount').value) || 3;
            count = Math.min(Math.max(count, 2), 100);
            roles = []; currentIndex = 0; actualCategory = currentCategory;

            if (currentCategory === 'random') {
                let activeToggles = document.querySelectorAll('#randCats .cat-toggle.active');
                let cats = Array.from(activeToggles).map(el => el.dataset.val);
                actualCategory = cats[Math.floor(Math.random() * cats.length)];
            }

            let list = data[actualCategory];
            let pick = list[Math.floor(Math.random() * list.length)];

            let initialImg = ""; let brawlerNumId = null;
            if (actualCategory === 'brawl') {
                let apiMatch = apiBrawlersData.find(b => b.name.toLowerCase().replace(/[^a-z0-9]/g, '') === pick.id.replace(/[^a-z0-9]/g, ''));
                if (apiMatch) { brawlerNumId = apiMatch.id; initialImg = `https://cdn.brawlify.com/brawlers/model/${brawlerNumId}.png`; }
            } else if (actualCategory === 'clash') initialImg = `https://cdn.royaleapi.com/static/img/cards/hd/${pick.id}.png`;
            else if (actualCategory === 'genshin') initialImg = `https://genshin.jmp.blue/characters/${pick.id}/portrait`;
            else if (actualCategory === 'locations') initialImg = pick.img;
            else initialImg = `https://minecraft.wiki/wiki/Special:FilePath/${pick.id}_JE2_BE2.png`;

            for(let i=0; i<count; i++) roles.push({ n: pick.n.toUpperCase(), id: pick.id, img: initialImg, numId: brawlerNumId, cat: actualCategory });

            let spies = spyMode === 'one' ? 1 : Math.floor(Math.random() * count);
            let placed = 0;
            while(placed < spies) {
                let rIdx = Math.floor(Math.random() * count);
                if(roles[rIdx].n !== "ШПИОН") { roles[rIdx] = { n: "ШПИОН", id: "spy", img: spyIcon, cat: actualCategory }; placed++; }
            }

            lastGameRoles = roles.map(r => r.n);
            document.getElementById('setup').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); updateUI();
        }

        function showRole() {
            let r = roles[currentIndex];
            document.getElementById('roleText').innerText = r.n;
            let img = document.getElementById('roleImg');
            img.dataset.step = '0'; img.onerror = null; img.src = '';

            function setFallback() {
                img.onerror = null;
                let fallbackName = (r.n === "ШПИОН") ? "?" : r.n;
                let bg = (r.n === "ШПИОН") ? "ef4444" : (r.cat === 'minecraft' ? "4ade80" : (r.cat === 'clash' ? "fbbf24" : (r.cat === 'genshin' ? "f8fafc" : (r.cat === 'locations' ? "14b8a6" : "818cf8"))));
                let color = (r.cat === 'genshin' && r.n !== "ШПИОН") ? "0f172a" : "ffffff";
                if (r.n !== "ШПИОН" && r.cat !== 'genshin') color = "0f172a";
                img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(fallbackName)}&background=${bg}&color=${color}&size=200&font-size=0.4`;
            }

            img.onerror = function() {
                let step = parseInt(this.dataset.step); this.dataset.step = step + 1;
                if (r.cat === 'minecraft' && r.id !== 'spy') {
                    if (step === 0) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}.png`; else if (step === 1) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}_JE1_BE1.png`; else if (step === 2) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}_JE3.png`; else setFallback();
                } else if (r.cat === 'clash' && r.id !== 'spy') {
                    if (step === 0) this.src = `https://cdn.royaleapi.com/static/img/cards/${r.id}.png`; else setFallback();
                } else if (r.cat === 'genshin' && r.id !== 'spy') {
                    if (step === 0) this.src = `https://genshin.jmp.blue/characters/${r.id}/gacha-splash`; else if (step === 1) this.src = `https://genshin.jmp.blue/characters/${r.id}/icon-big`; else setFallback();
                } else if (r.cat === 'brawl' && r.id !== 'spy') {
                    if (r.numId) { if (step === 0) this.src = `https://cdn.brawlify.com/brawlers/borderless/${r.numId}.png`; else if (step === 1) this.src = `https://cdn.brawlify.com/brawler/${r.numId}.png`; else setFallback(); } else setFallback();
                } else setFallback();
            };

            if(r.img) img.src = r.img; else setFallback();

            let card = document.getElementById('roleCard');
            card.classList.remove('hidden');
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = null;

            document.getElementById('tapArea').classList.add('hidden');
        }

        function nextPlayer() {
            currentIndex++;
            if(currentIndex >= roles.length) {
                document.getElementById('game').classList.add('hidden'); resetTheme(); document.getElementById('main-menu').classList.remove('hidden');
                let n = document.getElementById('notification'); n.classList.add('show'); setTimeout(() => n.classList.remove('show'), 3000);
            } else updateUI();
        }

        function updateUI() {
            document.getElementById('roleCard').classList.add('hidden'); document.getElementById('tapArea').classList.remove('hidden');
            document.getElementById('playerInstruction').innerText = `Игрок №${currentIndex + 1}, забери устройство`;
            document.getElementById('playerStatus').innerText = `Прогресс: ${currentIndex} / ${roles.length}`;
        }
    </script>
</body>
</html>
