<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xleb Games</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --accent: #38bdf8; 
            --shadow-color: rgba(56, 189, 248, 0.4); 
            --text: #f8fafc; 
            --btn-text-color: #0f172a;
            --secondary: #94a3b8; 
            --btn-inactive: #334155; 
            --card-border: 1px solid rgba(255,255,255,0.1);
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg);
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg) 70%);
            background-size: 100% 200%;
            animation: bgShift 8s ease-in-out infinite alternate;
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            text-align: center; 
            transition: all 0.5s ease;
        }
        
        .container { 
            width: 90%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        .container:not(.hidden) {
            animation: fadeScreenIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        button { cursor: pointer; border: none; font-family: inherit; outline: none; }
        
        button.main-btn { 
            background: var(--accent); 
            color: var(--btn-text-color); 
            padding: 10px 20px; 
            font-size: 16px; 
            font-weight: 800; 
            border-radius: 16px; 
            width: 100%; 
            min-height: 54px; 
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
            transition: all 0.3s ease; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px var(--shadow-color); 
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        
        button.main-btn.secondary-btn {
            background: var(--btn-inactive); 
            color: white; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.2); 
            margin-top: 15px;
        }

        button.main-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: 0.5s;
        }
        
        button.main-btn:active:not(:disabled) { 
            transform: translateY(4px) scale(0.98); 
            box-shadow: 0 0px 0 rgba(0,0,0,0.3), 0 5px 10px rgba(0,0,0,0.2); 
        }

        button.main-btn:disabled {
            background: var(--btn-inactive) !important;
            color: var(--secondary) !important;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2) !important;
            cursor: not-allowed;
            transform: none !important;
            border-color: transparent !important;
        }
        button.main-btn:disabled::after { display: none; }

        .btn-brawl { background: #38bdf8 !important; color: #0f172a !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(56, 189, 248, 0.3) !important;}
        .btn-mc { background: #4ade80 !important; color: #064e3b !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(74, 222, 128, 0.3) !important;}
        .btn-cr { background: #fbbf24 !important; color: #451a03 !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(251, 191, 36, 0.3) !important;}
        .btn-genshin { background: #f8fafc !important; color: #0f172a !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(248, 250, 252, 0.3) !important;}
        .btn-locations { background: #14b8a6 !important; color: #042f2e !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(20, 184, 166, 0.3) !important;}
        .btn-random { 
            background: linear-gradient(90deg, #f472b6, #c084fc, #818cf8, #f472b6) !important; 
            background-size: 300% 100% !important; animation: gradientPan 4s linear infinite !important;
            color: white !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(192, 132, 252, 0.4) !important;
        }

        h1 { 
            font-weight: 800; color: var(--accent); margin-top: 0; margin-bottom: 20px; 
            text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 0 15px var(--shadow-color);
            transition: color 0.5s, text-shadow 0.5s;
        }
        
        h2 { font-size: 28px; margin: 10px 0; color: var(--accent); text-shadow: 0 0 15px var(--shadow-color); transition: color 0.5s, text-shadow 0.5s; }

        .card { 
            background: var(--card-bg); border-radius: 28px; padding: 25px; 
            box-shadow: 0 20px 30px -5px rgba(0,0,0,0.4), inset 0 0 15px rgba(255,255,255,0.02); 
            border: var(--card-border); margin-bottom: 20px; width: 100%; box-sizing: border-box; transition: border-color 0.5s;
        }
        
        .dashed-card { 
            border: 2px dashed var(--secondary); background: rgba(148, 163, 184, 0.05); padding: 20px; margin-bottom: 20px; 
            border-radius: 16px; animation: pulseDash 2s infinite alternate; transition: border-color 0.5s;
        }

        input[type="number"], input[type="text"], select { 
            background: var(--bg); border: 1px solid var(--secondary); color: white; 
            padding: 12px; border-radius: 12px; outline: none; font-size: 16px;
        }
        input[type="number"]:focus, input[type="text"]:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--shadow-color); }

        .mode-selector { display: flex; gap: 10px; margin-top: 15px; width: 100%; }
        .mode-btn { background: var(--btn-inactive); color: var(--secondary); padding: 12px; border-radius: 12px; flex: 1; font-weight: 600; transition: all 0.3s; }
        .mode-btn.active { background: var(--accent); color: var(--btn-text-color); transform: scale(1.05); box-shadow: 0 5px 15px var(--shadow-color); }

        .cat-toggles { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
        .cat-toggle { background: var(--btn-inactive); color: var(--secondary); padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; user-select: none; border: 1px solid transparent; }
        .cat-toggle.active { background: var(--accent); color: var(--btn-text-color); box-shadow: 0 2px 8px var(--shadow-color); border-color: var(--accent); }

        .role-img-container { 
            width: 180px; height: 180px; margin: 15px auto; position: relative; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, rgba(0,0,0,0.1), rgba(0,0,0,0.3)); border-radius: 24px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .role-img { width: 100%; height: 100%; object-fit: cover; animation: breathing 3s ease-in-out infinite; border-radius: 12px; }

        .hidden { display: none !important; }
        .version-tag { position: fixed; bottom: 10px; font-size: 10px; color: rgba(148, 163, 184, 0.3); z-index: 999; padding: 10px; cursor: default;}

        .admin-row { display: flex; flex-direction: column; text-align: left; margin-bottom: 15px; }
        .admin-row label { font-size: 12px; color: var(--secondary); margin-bottom: 5px; }
        .admin-row input, .admin-row select { width: 100%; box-sizing: border-box; }
        #adminLastGameRoles {
            font-size: 14px; color: var(--text); max-height: 120px; overflow-y: auto;
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;
            margin-top: 5px; text-align: left; line-height: 1.5;
        }

        @keyframes bgShift { 0% { background-position: 50% 0%; } 100% { background-position: 50% 100%; } }
        @keyframes gradientPan { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes fadeScreenIn { 0% { opacity: 0; transform: translateY(20px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes breathing { 0% { transform: scale(1); filter: drop-shadow(0 10px 15px var(--shadow-color)); } 50% { transform: scale(1.08); filter: drop-shadow(0 15px 25px var(--shadow-color)); } 100% { transform: scale(1); filter: drop-shadow(0 10px 15px var(--shadow-color)); } }
        
        /* ОБЫЧНАЯ АНИМАЦИЯ ПОЯВЛЕНИЯ КАРТОЧКИ (FADE + SCALE) */
        @keyframes popInCard { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #roleCard:not(.hidden) { animation: popInCard 0.3s ease-out forwards; }
        
        @keyframes pulseDash { 0% { border-color: rgba(148, 163, 184, 0.3); } 100% { border-color: rgba(148, 163, 184, 0.7); } }
        
        #notification { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: var(--card-bg); color: var(--accent); padding: 16px 28px; border-radius: 24px; 
            border: 1px solid var(--accent); transition: top 0.6s; z-index: 1000; font-weight: bold;
        }
        #notification.show { top: 40px; }

        body.theme-random { animation: randomThemeColors 8s linear infinite !important; }
        body.theme-random .main-btn:not(.secondary-btn):not(:disabled) { background: transparent !important; color: white !important; border: 2px solid white; animation: randomThemeBtn 8s linear infinite !important; }
        body.theme-random .mode-btn.active { color: white !important; animation: randomThemeBtn 8s linear infinite !important; }
        body.theme-random .cat-toggle.active { color: white !important; animation: randomThemeBtn 8s linear infinite !important; }
        
        body.theme-random .main-btn:disabled { animation: none !important; }

        @keyframes randomThemeColors { 0% { --accent: #f472b6; --shadow-color: rgba(244,114,182,0.5); --btn-text-color: white; } 33% { --accent: #c084fc; --shadow-color: rgba(192,132,252,0.5); --btn-text-color: white; } 66% { --accent: #818cf8; --shadow-color: rgba(129,140,248,0.5); --btn-text-color: white; } 100% { --accent: #f472b6; --shadow-color: rgba(244,114,182,0.5); --btn-text-color: white; } }
        @keyframes randomThemeBtn { 0% { background: #f472b6; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(244,114,182,0.4); border-color:#f472b6;} 33% { background: #c084fc; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(192,132,252,0.4); border-color:#c084fc;} 66% { background: #818cf8; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(129,140,248,0.4); border-color:#818cf8;} 100% { background: #f472b6; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(244,114,182,0.4); border-color:#f472b6;} }
    </style>
</head>
<body>

    <div id="notification">Все роли розданы!</div>

    <div class="container" id="main-menu">
        <h1>Xleb Games</h1>
        <button class="main-btn btn-brawl" onclick="showCategories()">ИГРАТЬ В ШПИОНА</button>
        <p style="font-size: 12px; color: var(--secondary); margin-top: 25px;">Подпишись на <a href="https://t.me/xlebusek_v_gd" target="_blank" style="color:var(--accent)">телеграмм канал</a></p>
    </div>

    <div class="container hidden" id="category-menu">
        <h1>Категории</h1>
        <div class="card" style="display: flex; flex-direction: column; gap: 12px; padding: 20px;">
            <button class="main-btn btn-brawl" onclick="showSetup('brawl')">BRAWL STARS</button>
            <button class="main-btn btn-mc" onclick="showSetup('minecraft')">MINECRAFT</button>
            <button class="main-btn btn-cr" onclick="showSetup('clash')">CLASH ROYALE</button>
            <button class="main-btn btn-genshin" onclick="showSetup('genshin')">GENSHIN IMPACT</button>
            <button class="main-btn btn-locations" onclick="showSetup('locations')">ЛОКАЦИИ</button>
            <button class="main-btn btn-random" onclick="showSetup('random')">🎲 РАНДОМ</button>
        </div>
        <button class="main-btn secondary-btn" onclick="goBackToMain()">НАЗАД</button>
    </div>

    <div class="container hidden" id="setup">
        <h1 id="setupTitle">Настройка</h1>
        <div class="card">
            <p style="color: var(--secondary); font-size: 14px; margin-top: 0;">Количество игроков?</p>
            <input type="number" id="playerCount" value="3" min="2" max="100" style="width: 80px; text-align: center;">
            
            <p style="color: var(--secondary); font-size: 14px; margin-top: 25px; margin-bottom: 5px;">Шпионы:</p>
            <div class="mode-selector">
                <button id="btn1" class="mode-btn active" onclick="setMode('one')">1 Шпион</button>
                <button id="btnRnd" class="mode-btn" onclick="setMode('random')">Рандом</button>
            </div>

            <div id="randomSettings" class="hidden" style="margin-top: 25px;">
                <p style="color: var(--secondary); font-size: 14px; margin-bottom: 5px;">Участвуют в рандоме:</p>
                <div class="cat-toggles" id="randCats">
                    <div class="cat-toggle active" data-val="brawl" onclick="toggleRandomCat(this)">Brawl Stars</div>
                    <div class="cat-toggle active" data-val="minecraft" onclick="toggleRandomCat(this)">Minecraft</div>
                    <div class="cat-toggle active" data-val="clash" onclick="toggleRandomCat(this)">Clash Royale</div>
                    <div class="cat-toggle active" data-val="genshin" onclick="toggleRandomCat(this)">Genshin Impact</div>
                    <div class="cat-toggle active" data-val="locations" onclick="toggleRandomCat(this)">Локации</div>
                </div>
            </div>
        </div>
        <button id="startGameBtn" class="main-btn" onclick="startGame()">НАЧАТЬ</button>
        <button class="main-btn secondary-btn" onclick="goBackToCategories()">НАЗАД</button>
    </div>

    <div class="container hidden" id="admin-menu">
        <h1 style="color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.4);">Admin Panel</h1>
        <div class="card" style="padding: 20px;">
            <div class="admin-row">
                <label>Категория</label>
                <select id="adminCat" onchange="updateAdminCharList()">
                    <option value="brawl">Brawl Stars</option>
                    <option value="minecraft">Minecraft</option>
                    <option value="clash">Clash Royale</option>
                    <option value="genshin">Genshin Impact</option>
                    <option value="locations">Локации</option>
                </select>
            </div>
            <div class="admin-row">
                <label>Персонаж для мирных</label>
                <select id="adminChar"></select>
            </div>
            <div class="admin-row">
                <label>Всего игроков</label>
                <input type="number" id="adminPlayerCount" value="4" min="2">
            </div>
            <div class="admin-row">
                <label>Номера шпионов (через запятую, напр. 1, 3)</label>
                <input type="text" id="adminSpies" placeholder="Например: 2, 4">
            </div>
            <div class="admin-row" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                <label style="color: #ef4444; font-weight: bold;">Роли прошлой игры:</label>
                <div id="adminLastGameRoles">Игр еще не было</div>
            </div>
        </div>
        <button class="main-btn" style="background: #ef4444; color: white;" onclick="startAdminGame()">ИГРАТЬ</button>
        <button class="main-btn secondary-btn" onclick="closeAdminMenu()">ЗАКРЫТЬ</button>
    </div>

    <div class="container hidden" id="game">
        <div id="roleCard" class="card hidden">
            <p style="color: var(--secondary); font-size: 14px; margin: 0;">Твоя роль:</p>
            <h2 id="roleText"></h2>
            <div class="role-img-container"><img id="roleImg" class="role-img" src=""></div>
            <button class="main-btn secondary-btn" onclick="nextPlayer()">СКРЫТЬ</button>
        </div>
        
        <div id="tapArea">
            <div class="dashed-card"><p id="playerInstruction" style="margin: 0; font-size: 18px; font-weight: 600;"></p></div>
            <button class="main-btn" onclick="showRole()">ПОКАЗАТЬ РОЛЬ</button>
        </div>
        <p id="playerStatus" style="color: var(--secondary); margin-top: 20px; font-weight: 600; letter-spacing: 1px;"></p>
    </div>

    <div class="version-tag" id="versionTag" onclick="handleVersionTap()">Версия 4.0</div>

        let versionTaps = 0;

        function handleVersionTap() {
            versionTaps++;
            clearTimeout(tapTimeout);
            if(versionTaps >= 5) {
                versionTaps = 0;
                document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
                resetTheme();
                updateAdminCharList();
                showLastGameRoles(); 
                document.getElementById('admin-menu').classList.remove('hidden');
            } else {
                tapTimeout = setTimeout(() => { versionTaps = 0; }, 600);
            }
        }

        function showLastGameRoles() {
            let historyDiv = document.getElementById('adminLastGameRoles');
            if (lastGameRoles && lastGameRoles.length > 0) {
                let html = lastGameRoles.map((roleName, index) => {
                    let color = roleName === "ШПИОН" ? "#ef4444" : "var(--text)";
                    return `<span style="color: ${color}">Игрок ${index + 1} - ${roleName}</span>`;
                }).join('<br>');
                historyDiv.innerHTML = html;
            } else {
                historyDiv.innerHTML = "Игр еще не было";
            }
        }

        function updateAdminCharList() {
            const cat = document.getElementById('adminCat').value;
            const sel = document.getElementById('adminChar');
            sel.innerHTML = '';
            data[cat].sort((a,b) => a.n.localeCompare(b.n)).forEach((char) => {
                let opt = document.createElement('option');
                opt.value = char.id;
                opt.innerText = char.n;
                sel.appendChild(opt);
            });
        }

        function closeAdminMenu() {
            document.getElementById('admin-menu').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function startAdminGame() {
            let count = parseInt(document.getElementById('adminPlayerCount').value) || 2;
            let cat = document.getElementById('adminCat').value;
            let charId = document.getElementById('adminChar').value;
            let spyStr = document.getElementById('adminSpies').value;
            
            let spiesIndices = [];
            if (spyStr.trim() !== '') {
                spiesIndices = spyStr.split(',').map(s => parseInt(s.trim()) - 1).filter(n => !isNaN(n) && n >= 0 && n < count);
            }

            let pick = data[cat].find(c => c.id === charId);
            actualCategory = cat;
            
            roles = [];
            for (let i = 0; i < count; i++) {
                if (spiesIndices.includes(i)) {
                    roles.push({ n: "ШПИОН", id: "spy", img: spyIcon, cat: cat });
                } else {
                    let initialImg = ""; let brawlerNumId = null;
                    if (cat === 'brawl') {
                        let apiMatch = apiBrawlersData.find(b => b.name.toLowerCase().replace(/[^a-z0-9]/g, '') === pick.id.replace(/[^a-z0-9]/g, ''));
                        if (apiMatch) { brawlerNumId = apiMatch.id; initialImg = `https://cdn.brawlify.com/brawlers/model/${brawlerNumId}.png`; }
                    } else if (cat === 'clash') initialImg = `https://cdn.royaleapi.com/static/img/cards/hd/${pick.id}.png`;
                    else if (cat === 'genshin') initialImg = `https://genshin.jmp.blue/characters/${pick.id}/portrait`;
                    else if (cat === 'locations') initialImg = pick.img;
                    else initialImg = `https://minecraft.wiki/wiki/Special:FilePath/${pick.id}_JE2_BE2.png`;

                    roles.push({ n: pick.n.toUpperCase(), id: pick.id, img: initialImg, numId: brawlerNumId, cat: cat });
                }
            }

            lastGameRoles = roles.map(r => r.n); 
            currentIndex = 0;
            document.getElementById('admin-menu').classList.add('hidden'); 
            document.getElementById('game').classList.remove('hidden'); 
            updateUI();
        }

            if (currentCategory === 'random') {
                let activeCount = document.querySelectorAll('#randCats .cat-toggle.active').length;
                if (activeCount < 2) {
                    btn.disabled = true;
                    btn.innerText = "ВЫБЕРИТЕ МИНИМУМ 2"; 
                    btn.style.fontSize = "14px";
                } else {
                    btn.disabled = false;

                }
            } else {
                btn.disabled = false;
                btn.innerText = "НАЧАТЬ";
                btn.style.fontSize = "16px";
            }
        }

            else if (cat === 'genshin') { root.style.setProperty('--accent', '#f8fafc'); root.style.setProperty('--shadow-color', 'rgba(248, 250, 252, 0.3)'); document.getElementById('setupTitle').innerText = 'Genshin Impact'; }

            else if (cat === 'random') { document.body.classList.add('theme-random'); document.getElementById('setupTitle').innerText = 'Рандом'; document.getElementById('randomSettings').classList.remove('hidden'); } 
            else { root.style.setProperty('--accent', '#38bdf8'); root.style.setProperty('--shadow-color', 'rgba(56, 189, 248, 0.4)'); document.getElementById('setupTitle').innerText = 'Brawl Stars'; }

        function startGame() {
            let count = parseInt(document.getElementById('playerCount').value) || 3;
            count = Math.min(Math.max(count, 2), 100);
            roles = []; currentIndex = 0; actualCategory = currentCategory;
            
            if (currentCategory === 'random') {
                let activeToggles = document.querySelectorAll('#randCats .cat-toggle.active');
                let cats = Array.from(activeToggles).map(el => el.dataset.val);
                actualCategory = cats[Math.floor(Math.random() * cats.length)];
            }

            let list = data[actualCategory];
            let pick = list[Math.floor(Math.random() * list.length)];
            
            let initialImg = ""; let brawlerNumId = null;
            if (actualCategory === 'brawl') {
                let apiMatch = apiBrawlersData.find(b => b.name.toLowerCase().replace(/[^a-z0-9]/g, '') === pick.id.replace(/[^a-z0-99]/g, ''));
                if (apiMatch) { brawlerNumId = apiMatch.id; initialImg = `https://cdn.brawlify.com/brawlers/model/${brawlerNumId}.png`; }
            } else if (actualCategory === 'clash') initialImg = `https://cdn.royaleapi.com/static/img/cards/hd/${pick.id}.png`;
            else if (actualCategory === 'genshin') initialImg = `https://genshin.jmp.blue/characters/${pick.id}/portrait`;
            else if (actualCategory === 'locations') initialImg = pick.img;
            else initialImg = `https://minecraft.wiki/wiki/Special:FilePath/${pick.id}_JE2_BE2.png`;

            for(let i=0; i<count; i++) roles.push({ n: pick.n.toUpperCase(), id: pick.id, img: initialImg, numId: brawlerNumId, cat: actualCategory });

            // Удален гарант: в рандомном режиме может быть 0 шпионов
            let spies = spyMode === 'one' ? 1 : Math.floor(Math.random() * count);
            let placed = 0;
            while(placed < spies) {
                let rIdx = Math.floor(Math.random() * count);
                if(roles[rIdx].n !== "ШПИОН") { roles[rIdx] = { n: "ШПИОН", id: "spy", img: spyIcon, cat: actualCategory }; placed++; }
            }

            lastGameRoles = roles.map(r => r.n);

            document.getElementById('setup').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); updateUI();
        }

        function showRole() {
            let r = roles[currentIndex];
            document.getElementById('roleText').innerText = r.n;
            let img = document.getElementById('roleImg');
            
            img.dataset.step = '0'; img.onerror = null; img.src = ''; 
            
            function setFallback() {
                img.onerror = null; let fallbackName = (r.n === "ШПИОН") ? "?" : r.n; 
                let bg = (r.n === "ШПИОН") ? "ef4444" : (r.cat === 'minecraft' ? "4ade80" : (r.cat === 'clash' ? "fbbf24" : (r.cat === 'genshin' ? "f8fafc" : (r.cat === 'locations' ? "14b8a6" : "38bdf8"))));
                let color = (r.cat === 'genshin' && r.n !== "ШПИОН") ? "0f172a" : "ffffff";
                if (r.n !== "ШПИОН" && r.cat !== 'genshin') color = "0f172a";
                img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(fallbackName)}&background=${bg}&color=${color}&size=200&font-size=0.4`;
            }

            img.onerror = function() {
                let step = parseInt(this.dataset.step); this.dataset.step = step + 1;
                if (r.cat === 'minecraft' && r.id !== 'spy') {
                    if (step === 0) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}.png`; else if (step === 1) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}_JE1_BE1.png`; else if (step === 2) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}_JE3.png`; else setFallback();
                } else if (r.cat === 'clash' && r.id !== 'spy') {
                    if (step === 0) this.src = `https://cdn.royaleapi.com/static/img/cards/${r.id}.png`; else setFallback();
                } else if (r.cat === 'genshin' && r.id !== 'spy') {
                    if (step === 0) this.src = `https://genshin.jmp.blue/characters/${r.id}/gacha-splash`; else if (step === 1) this.src = `https://genshin.jmp.blue/characters/${r.id}/icon-big`; else setFallback();
                } else if (r.cat === 'brawl' && r.id !== 'spy') {
                    if (r.numId) { if (step === 0) this.src = `https://cdn.brawlify.com/brawlers/borderless/${r.numId}.png`; else if (step === 1) this.src = `https://cdn.brawlify.com/brawler/${r.numId}.png`; else setFallback(); } else setFallback();
                } else setFallback();
            };

            if(r.img) img.src = r.img; else setFallback();

            // Перезапуск анимации переворота
            let card = document.getElementById('roleCard');
            card.style.animation = 'none';
            card.offsetHeight; // триггер reflow
            card.style.animation = null;

            document.getElementById('tapArea').classList.add('hidden'); card.classList.remove('hidden');
        }

        function nextPlayer() {
            currentIndex++;
            if(currentIndex >= roles.length) {
                document.getElementById('game').classList.add('hidden'); resetTheme(); document.getElementById('main-menu').classList.remove('hidden');
                let n = document.getElementById('notification'); n.classList.add('show'); setTimeout(() => n.classList.remove('show'), 3000);
            } else updateUI();
        }

        function updateUI() {
            document.getElementById('roleCard').classList.add('hidden'); document.getElementById('tapArea').classList.remove('hidden');
            document.getElementById('playerInstruction').innerText = `Игрок №${currentIndex + 1}, забери устройство`;
            document.getElementById('playerStatus').innerText = `Прогресс: ${currentIndex} / ${roles.length}`;
        }
    </script>
</body>
</html>
