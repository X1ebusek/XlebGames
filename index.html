<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xleb Games</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --accent: #38bdf8; 
            --shadow-color: rgba(56, 189, 248, 0.4); 
            --text: #f8fafc; 
            --btn-text-color: #0f172a;
            --secondary: #94a3b8; 
            --btn-inactive: #334155; 
            --card-border: 1px solid rgba(255,255,255,0.1);
        }
        body { 
            background: var(--bg);
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg) 70%);
            background-size: 100% 200%;
            animation: bgShift 8s ease-in-out infinite alternate;
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            text-align: center; 
            transition: all 0.5s ease;
        }
        
        .container { 
            width: 90%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        .container:not(.hidden) {
            animation: fadeScreenIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        button { cursor: pointer; border: none; font-family: inherit; outline: none; }
        
        button.main-btn { 
            background: var(--accent); 
            color: var(--btn-text-color); 
            padding: 16px 32px; 
            font-size: 16px; 
            font-weight: 800; 
            border-radius: 16px; 
            width: 100%; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px var(--shadow-color); 
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        
        button.main-btn.secondary-btn {
            background: var(--btn-inactive); 
            color: white; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.2); 
            margin-top: 15px;
        }

        button.main-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: 0.5s;
        }
        
        button.main-btn:active { 
            transform: translateY(4px) scale(0.98); 
            box-shadow: 0 0px 0 rgba(0,0,0,0.3), 0 5px 10px rgba(0,0,0,0.2); 
        }

        .btn-brawl { background: #38bdf8 !important; color: #0f172a !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(56, 189, 248, 0.3) !important;}
        .btn-mc { background: #4ade80 !important; color: #064e3b !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(74, 222, 128, 0.3) !important;}
        .btn-cr { background: #fbbf24 !important; color: #451a03 !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(251, 191, 36, 0.3) !important;}
        .btn-genshin { background: #f8fafc !important; color: #0f172a !important; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(248, 250, 252, 0.3) !important;}
        .btn-random { 
            background: linear-gradient(90deg, #f472b6, #c084fc, #818cf8, #f472b6) !important; 
            background-size: 300% 100% !important;
            animation: gradientPan 4s linear infinite !important;
            color: white !important; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(192, 132, 252, 0.4) !important;
        }

        h1 { 
            font-weight: 800; 
            color: var(--accent); 
            margin-top: 0; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            text-shadow: 0 0 15px var(--shadow-color);
            transition: color 0.5s, text-shadow 0.5s;
        }
        
        h2 { 
            font-size: 28px; 
            margin: 10px 0; 
            color: var(--accent); 
            text-shadow: 0 0 15px var(--shadow-color); 
            transition: color 0.5s, text-shadow 0.5s;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 28px; 
            padding: 25px; 
            box-shadow: 0 20px 30px -5px rgba(0,0,0,0.4), inset 0 0 15px rgba(255,255,255,0.02); 
            border: var(--card-border); 
            margin-bottom: 20px; 
            width: 100%; 
            box-sizing: border-box; 
            transition: border-color 0.5s;
        }
        
        .dashed-card { 
            border: 2px dashed var(--secondary); 
            background: rgba(148, 163, 184, 0.05); 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 16px; 
            animation: pulseDash 2s infinite alternate;
            transition: border-color 0.5s;
        }

        input { 
            background: var(--bg); border: 1px solid var(--secondary); color: white; 
            padding: 12px; border-radius: 12px; width: 80px; text-align: center; font-size: 20px; outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--shadow-color); }

        .mode-selector { display: flex; gap: 10px; margin-top: 15px; width: 100%; }
        .mode-btn { background: var(--btn-inactive); color: var(--secondary); padding: 12px; border-radius: 12px; flex: 1; font-weight: 600; transition: all 0.3s; }
        .mode-btn.active { background: var(--accent); color: var(--btn-text-color); transform: scale(1.05); box-shadow: 0 5px 15px var(--shadow-color); }

        .role-img-container { 
            width: 180px; height: 180px; margin: 15px auto; 
            position: relative; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, rgba(0,0,0,0.1), rgba(0,0,0,0.3)); 
            border-radius: 24px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .role-img { 
            width: 100%; height: 100%; object-fit: contain; 
            animation: breathing 3s ease-in-out infinite;
        }

        .hidden { display: none !important; }
        .version-tag { position: fixed; bottom: 10px; font-size: 10px; color: rgba(148, 163, 184, 0.3); }

        @keyframes bgShift { 0% { background-position: 50% 0%; } 100% { background-position: 50% 100%; } }
        @keyframes gradientPan { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes fadeScreenIn { 0% { opacity: 0; transform: translateY(20px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        @keyframes breathing { 
            0% { transform: scale(1); filter: drop-shadow(0 10px 15px var(--shadow-color)); } 
            50% { transform: scale(1.08); filter: drop-shadow(0 15px 25px var(--shadow-color)); } 
            100% { transform: scale(1); filter: drop-shadow(0 10px 15px var(--shadow-color)); } 
        }
        
        @keyframes popInCard { 0% { transform: scale(0.8) rotate(-5deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
        @keyframes pulseDash { 0% { border-color: rgba(148, 163, 184, 0.3); } 100% { border-color: rgba(148, 163, 184, 0.7); } }
        #roleCard:not(.hidden) { animation: popInCard 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.2) forwards; }
        
        #notification { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: var(--card-bg); color: var(--accent); padding: 16px 28px; border-radius: 24px; 
            border: 1px solid var(--accent); transition: top 0.6s; z-index: 1000; font-weight: bold;
        }
        #notification.show { top: 40px; }

        /* Специальные стили для рандомной темы */
        body.theme-random {
            animation: randomThemeColors 8s linear infinite !important;
        }
        body.theme-random .main-btn:not(.secondary-btn) {
            background: transparent !important;
            color: white !important;
            border: 2px solid white;
            animation: randomThemeBtn 8s linear infinite !important;
        }
        body.theme-random .mode-btn.active {
            color: white !important;
            animation: randomThemeBtn 8s linear infinite !important;
        }

        @keyframes randomThemeColors {
            0% { --accent: #f472b6; --shadow-color: rgba(244,114,182,0.5); --btn-text-color: white; }
            33% { --accent: #c084fc; --shadow-color: rgba(192,132,252,0.5); --btn-text-color: white; }
            66% { --accent: #818cf8; --shadow-color: rgba(129,140,248,0.5); --btn-text-color: white; }
            100% { --accent: #f472b6; --shadow-color: rgba(244,114,182,0.5); --btn-text-color: white; }
        }
        @keyframes randomThemeBtn {
            0% { background: #f472b6; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(244,114,182,0.4); border-color:#f472b6;}
            33% { background: #c084fc; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(192,132,252,0.4); border-color:#c084fc;}
            66% { background: #818cf8; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(129,140,248,0.4); border-color:#818cf8;}
            100% { background: #f472b6; box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(244,114,182,0.4); border-color:#f472b6;}
        }
    </style>
</head>

            if (cat === 'minecraft') {
                root.style.setProperty('--accent', '#4ade80');
                root.style.setProperty('--shadow-color', 'rgba(74, 222, 128, 0.4)');
                document.getElementById('setupTitle').innerText = 'Minecraft';
            } else if (cat === 'clash') {
                root.style.setProperty('--accent', '#fbbf24');
                root.style.setProperty('--shadow-color', 'rgba(251, 191, 36, 0.4)');
                document.getElementById('setupTitle').innerText = 'Clash Royale';
            } else if (cat === 'genshin') {
                root.style.setProperty('--accent', '#f8fafc');
                root.style.setProperty('--shadow-color', 'rgba(248, 250, 252, 0.3)');
                document.getElementById('setupTitle').innerText = 'Genshin Impact';
            } else if (cat === 'random') {
                document.body.classList.add('theme-random');
                document.getElementById('setupTitle').innerText = 'Рандом';
            } else {
                root.style.setProperty('--accent', '#38bdf8');
                root.style.setProperty('--shadow-color', 'rgba(56, 189, 248, 0.4)');
                document.getElementById('setupTitle').innerText = 'Brawl Stars';
            }
            
            document.getElementById('category-menu').classList.add('hidden'); 
            document.getElementById('setup').classList.remove('hidden'); 
        }
        function goBackToCategories() { 
            resetTheme();
            document.getElementById('setup').classList.add('hidden'); 
            document.getElementById('category-menu').classList.remove('hidden'); 
        }

        function setMode(m) { 
            spyMode = m; 
            document.getElementById('btn1').classList.toggle('active', m === 'one'); 
            document.getElementById('btnRnd').classList.toggle('active', m === 'random'); 
        }

        function startGame() {
            let count = parseInt(document.getElementById('playerCount').value) || 3;
            count = Math.min(Math.max(count, 2), 100);
            roles = []; currentIndex = 0;

            actualCategory = currentCategory;
            if (currentCategory === 'random') {
                const cats = ['brawl', 'minecraft', 'clash', 'genshin'];
                actualCategory = cats[Math.floor(Math.random() * cats.length)];
            }

            let list = data[actualCategory];
            let pick = list[Math.floor(Math.random() * list.length)];
            
            let initialImg = "";
            let brawlerNumId = null;

            if (actualCategory === 'brawl') {
                let apiMatch = apiBrawlersData.find(b => 
                    b.name.toLowerCase().replace(/[^a-z0-9]/g, '') === pick.id.replace(/[^a-z0-9]/g, '')
                );
                if (apiMatch) {
                    brawlerNumId = apiMatch.id;
                    initialImg = `https://cdn.brawlify.com/brawlers/model/${brawlerNumId}.png`;
                }
            } else if (actualCategory === 'clash') {
                initialImg = `https://cdn.royaleapi.com/static/img/cards/hd/${pick.id}.png`;
            } else if (actualCategory === 'genshin') {
                // Используем портреты в полный рост
                initialImg = `https://genshin.jmp.blue/characters/${pick.id}/portrait`;
            } else {
                initialImg = `https://minecraft.wiki/wiki/Special:FilePath/${pick.id}_JE2_BE2.png`;
            }

            for(let i=0; i<count; i++) {
                roles.push({ 
                    n: pick.n.toUpperCase(), 
                    id: pick.id, 
                    img: initialImg, 
                    numId: brawlerNumId, 
                    cat: actualCategory 
                });
            }

            let spies = spyMode === 'one' ? 1 : Math.floor(Math.random() * (count + 1));
            let placed = 0;
            while(placed < spies) {
                let rIdx = Math.floor(Math.random() * count);
                if(roles[rIdx].n !== "ШПИОН") { 
                    roles[rIdx] = { n: "ШПИОН", id: "spy", img: spyIcon, cat: actualCategory }; 
                    placed++; 
                }
            }

            [...new Set(roles.map(r => r.img))].forEach(src => {
                if(src) { const pre = new Image(); pre.src = src; }
            });

            document.getElementById('setup').classList.add('hidden'); 
            document.getElementById('game').classList.remove('hidden'); 
            updateUI();
        }

        function showRole() {
            let r = roles[currentIndex];
            document.getElementById('roleText').innerText = r.n;
            let img = document.getElementById('roleImg');
            
            img.dataset.step = '0';
            img.onerror = null; 
            img.src = ''; 
            
            function setFallback() {
                img.onerror = null;
                let fallbackName = (r.n === "ШПИОН") ? "?" : r.n; 
                let bg = (r.n === "ШПИОН") ? "ef4444" : 
                         (r.cat === 'minecraft' ? "4ade80" : 
                         (r.cat === 'clash' ? "fbbf24" : 
                         (r.cat === 'genshin' ? "f8fafc" : "38bdf8")));
                let color = (r.cat === 'genshin' && r.n !== "ШПИОН") ? "0f172a" : "ffffff";
                if (r.n !== "ШПИОН" && r.cat !== 'genshin') color = "0f172a";
                
                img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(fallbackName)}&background=${bg}&color=${color}&size=200&font-size=0.4`;
            }

            img.onerror = function() {
                let step = parseInt(this.dataset.step);
                this.dataset.step = step + 1;
                
                if (r.cat === 'minecraft' && r.id !== 'spy') {
                    if (step === 0) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}.png`;
                    else if (step === 1) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}_JE1_BE1.png`;
                    else if (step === 2) this.src = `https://minecraft.wiki/wiki/Special:FilePath/${r.id}_JE3.png`;
                    else setFallback();
                } else if (r.cat === 'clash' && r.id !== 'spy') {
                    if (step === 0) this.src = `https://cdn.royaleapi.com/static/img/cards/${r.id}.png`;
                    else setFallback();
                } else if (r.cat === 'genshin' && r.id !== 'spy') {
                    // Если портрет в полный рост не загрузился, пробуем гача-сплеш или иконку
                    if (step === 0) this.src = `https://genshin.jmp.blue/characters/${r.id}/gacha-splash`;
                    else if (step === 1) this.src = `https://genshin.jmp.blue/characters/${r.id}/icon-big`;
                    else setFallback();
                } else if (r.cat === 'brawl' && r.id !== 'spy') {
                    if (r.numId) {
                        if (step === 0) this.src = `https://cdn.brawlify.com/brawlers/borderless/${r.numId}.png`;
                        else if (step === 1) this.src = `https://cdn.brawlify.com/brawler/${r.numId}.png`;
                        else setFallback();
                    } else setFallback();
                } else {
                    setFallback();
                }
            };

            if(r.img) {
                img.src = r.img;
            } else {
                setFallback();
            }

            document.getElementById('tapArea').classList.add('hidden');
            document.getElementById('roleCard').classList.remove('hidden');
        }

        function nextPlayer() {
            currentIndex++;
            if(currentIndex >= roles.length) {
                document.getElementById('game').classList.add('hidden');
                resetTheme();
                document.getElementById('main-menu').classList.remove('hidden');
                let n = document.getElementById('notification');
                n.classList.add('show');
                setTimeout(() => n.classList.remove('show'), 3000);
            } else updateUI();
        }

        function updateUI() {
            document.getElementById('roleCard').classList.add('hidden');
            document.getElementById('tapArea').classList.remove('hidden');
            document.getElementById('playerInstruction').innerText = `Игрок №${currentIndex + 1}, забери устройство`;
            document.getElementById('playerStatus').innerText = `Прогресс: ${currentIndex} / ${roles.length}`;
        }
    </script>
</body>
</html>
